<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>

  <body>
    <form action="Results.html" method="get" enctype="multipart/form-data">
      <div>
        <label for="name">Name</label>
        <input
          type="text"
          name="name"
          id="name"
          placeholder="UserName"
          required
        />
      </div>
      <div>
        <label for="file">File</label>
        <input type="file" name="file" id="file" />
      </div>
      <div>
        <label for="email">Email</label>
        <input type="email" name="email" id="email" placeholder="email" />
      </div>

      <div>
        <label for="age">Age</label>
        <input
          type="number"
          name="age"
          id="age"
          placeholder="Age"
          min="1"
          max="120"
          step="2"
        />
      </div>

      <div>
        <label for="dob">Date Of Birth</label>
        <input type="date" name="dob" id="dob" min="1990-01-01" />
      </div>

      <div>
        <label for="password">Password</label>
        <input
          type="password"
          name="password"
          id="password"
          placeholder="password"
        />
      </div>

      <div>
        Favourite fruit:
        <div>
          <label for="banana">Banana</label>
          <input type="checkbox" id="banana" name="fruit" value="banana" />
        </div>

        <div>
          <label for="apple">Apple</label>
          <input type="checkbox" id="apple" name="fruit" value="apple" />
        </div>
      </div>

      <div>
        Gender:
        <div>
          <label for="male">Male</label>
          <input type="radio" id="male" name="gender" value="male" />
        </div>

        <div>
          <label for="female">Female</label>
          <input type="radio" id="female" name="gender" value="female" />
        </div>
      </div>
      <div>
        <label for="EyeColour">Eye Colour</label>
        <select name="EyeColour" id="EyeColour">
          <option value="blue">Blue</option>
          <option value="green">Green</option>
          <option value="brown">Brown</option>
          <option value="black">Black</option>
        </select>
      </div>
      <div>
        <input type="hidden" name="hidden" value="Helloworld" />
      </div>
      <div>
        <label for="bio">Bio</label>
        <textarea name="bio" id="bio"></textarea>
      </div>
      <div>
        <label for="phone">Phone</label>
        <input type="tel" name="phone" id="phone" placeholder="+6412345678" />
      </div>
      <div>
        <label for="url">URL</label>
        <input
          type="url"
          name="url"
          id="url"
          placeholder="https://example.com"
        />
      </div>
      <div>
        <label for="Colour">Colour</label>
        <input type="color" name="color" id="Colour" />
      </div>
      <div>
        <button type="reset">Reset</button>
        <button type="submit">Submit</button>
      </div>
    </form>
  </body>
</html>
